# Dadaguard — config di esempio. Copiala e adatta:
#   cp services.example.yaml services.yaml
# `services.yaml` è gitignorato: contiene la TUA infra, non va nel repo.
#
# Dadaguard è read-only (non tocca mai l'infra) e SENZA LLM (100% deterministico).
#
# QUESTO FILE È OPZIONALE. Senza services.yaml, Dadaguard parte lo stesso: usa le
# credenziali AWS di default (env/SSO, region da AWS_REGION) e AUTO-SCOPRE i servizi
# che girano (read-only, in memoria — non scrive nulla). Crea services.yaml solo per
# FISSARE la watchlist, le versioni attese, gli account multipli e il Terraform.
# È un override, non un prerequisito.
#
# Due modalità di config (vedi server/mode.js):
#  • local-first: questo file. La dashboard può anche editarlo (watchlist) ed è in italiano
#                 (in cloud usa la lingua del browser; toggle IT/EN sempre disponibile).
#  • cloud:       inietti lo YAML via env DADAGUARD_CONFIG (es. da una SSM SecureString) →
#                 niente file su disco, config read-only (versionata fuori dall'istanza).

# --- Account: NON servono elencarli a mano (in locale) ---
# In locale, senza `org`, Dadaguard scopre gli account dai profili SSO del tuo ~/.aws/config
# (ogni profilo con sso_account_id → un account; le varianti -ro / dev- dello stesso account sono
# deduplicate). Così `security`, `management`, ecc. compaiono da soli. Un account NON nel tuo
# ~/.aws/config non appare mai. La sezione `accounts:` qui sotto è quindi OPZIONALE: serve solo a
# rifinire quelli scoperti (label, color, region, terraform, wasteIgnore) o a dichiararne di espliciti.
# Disattiva la discovery con `discoverAccounts: false`, o salta account con:
#   discoverAccounts: { exclude: ["123456789012", "nome-profilo"] }

accounts:
  staging:
    # Auth AWS — due modi (mutuamente esclusivi; roleArn vince su profile):
    #  • locale: profile = profilo AWS CLI (SSO o access key)
    #  • cloud:  roleArn + externalId → il task role assume un ruolo read-only
    #            cross-account. Niente chiavi custodite. Vedi deploy/README.md.
    profile: my-staging-profile
    # accountId: '111122223333' # consigliato in consolidated billing: filtra costi e stima a QUESTO
    #                           # account. Senza, un account payer mostra i costi di TUTTA l'org (doppioni).
    # roleArn: arn:aws:iam::111122223333:role/dadaguard-readonly
    # externalId: una-stringa-segreta-condivisa # anti confused-deputy
    region: eu-west-1
    label: Staging
    color: "#1677ff"
    # wasteIgnore (opzionale) → allow-list per la pagina "Sprechi": risorse note e VOLUTE che non vuoi
    # più vedere segnalate (es. un reader Aurora tenuto per HA, un NAT/EIP di riserva). Match per id
    # (per gli EIP anche l'IP). Restano attive e monitorate: le togli solo dagli "sprechi".
    # wasteIgnore:
    #   - avvista-prod-db-reader-oltp   # reader HA voluto (idle by design)
    #   - eipalloc-0abc123               # oppure l'IP pubblico
    terraform: # opzionale → abilita #6 drift + #7 risorse non gestite
      stateBucket: my-tf-state-staging
      repoDir: /path/to/terraform-repo # opzionale → #6 drift completo (terragrunt plan)
      env: staging
  # production:
  #   profile: my-prod-profile
  #   region: eu-west-1
  #   label: Production
  #   color: "#cf1322"

# --- #8 AWS Organizations (opzionale) — invece di elencare gli account a mano ---
# Punta all'org: Dadaguard enumera i membri (organizations:ListAccounts) e crea un account
# per ciascuno, assumendo in ognuno il ruolo read-only `roleName`. Si combina con
# l'auto-discovery: senza `services`, spazzola TUTTI i membri × TUTTE le `regions`.
# Permessi: il chiamante (creds management, o callerRoleArn) deve poter fare
# organizations:ListAccounts; il task role deve poter assumere arn:aws:iam::*:role/<roleName>.
# org:
#   roleName: dadaguard-readonly        # ruolo RO presente in ogni membro
#   externalId: una-stringa-condivisa   # anti confused-deputy (uguale nei ruoli RO)
#   regions: [eu-west-1, us-east-1]      # sweep multi-region (default: una sola)
#   exclude: ["123456789012"]           # account da saltare (per Id o Nome)
#   # profile / callerRoleArn: identità che esegue ListAccounts (default: catena standard)

# --- Vista "Free Tier" (uso vs limite gratuito, es. CodeBuild 100 build-min) ---
# Il dato è aggregato org-wide ed è leggibile SOLO dal payer/management. Indica quale account
# interrogare (deve avere il permesso freetier:GetFreeTierUsage). Se assente: ripiega sull'identità
# `org`, poi sulla catena di credenziali di default (in cloud = il task role, che gira nel payer).
# freeTierAccount: management

services:
  # endpoint HTTP — #1 liveness (+ #2 versione se espone `version` nel /health)
  - name: my-api
    account: staging
    healthUrl: https://api.example.com/health
    # url: endpoint pubblico mostrato come link (🌐) sulla card. Facoltativo: se assente si ricava
    #   da healthUrl (origine) o dal dominio della risorsa (es. CloudFront). Dichiaralo quando vuoi
    #   l'URL "bello" — es. i servizi dietro Cloudflare, dove il DNS grezzo non è quello da mostrare.
    # url: https://api.example.com
    # Versione ATTESA — due provenienze (la dashboard mostra sempre da dove arriva):
    #  • expectedVersion: stringa fissa (statica).
    #  • expectedVersionUrl: fonte di verità DINAMICA (GET read-only di un manifest o
    #    endpoint: testo, o JSON via expectedVersionField, default "version"). Esempi:
    #    l'ultima release/tag su un raw GitHub, o il /version del repo. Ha precedenza;
    #    se irraggiungibile ripiega su expectedVersion.
    expectedVersion: v1.2.3
    # expectedVersionUrl: https://raw.githubusercontent.com/me/app/main/VERSION
    # expectedVersionField: version   # solo se l'URL ritorna JSON

  # Lambda — #3 runtime (invocazioni / error% / p95)
  - name: my-worker
    account: staging
    aws: { type: lambda, function: my-worker-fn, windowMinutes: 60 }

  # Lambda cron — dead-man switch (0 run nella cadenza = down; disabled se lo schedule è off)
  - name: my-cron
    account: staging
    aws: { type: lambda, function: my-cron-fn, schedule: 24h }
    ssm: { path: /myapp/staging/cron/my-cron } # #4 secret presenti (SSM, runtime)

  # ECS service — desired vs running
  - name: my-service
    account: staging
    aws: { type: ecs, cluster: my-cluster, service: my-svc }

  # RDS / Aurora — status cluster + istanze available
  - name: my-db
    account: staging
    aws: { type: rds, cluster: my-db-cluster }

# Altri tipi runtime disponibili:
#   aws: { type: asg, asg: my-asg }                 # Auto Scaling Group
#   aws: { type: alb, name: my-load-balancer }      # Application Load Balancer (target health)
#   aws: { type: ec2, instanceId: i-0123456789abc } # istanza EC2 (state + status check)
#   aws: { type: sqs, queue: my-queue, maxDepth: 1000 } # coda SQS (backlog; degraded se > maxDepth)
#   aws: { type: dynamodb, table: my-table }        # tabella DynamoDB (stato)
#   aws: { type: elasticache, cluster: my-redis }   # cluster ElastiCache (Redis/Memcached)
#   aws: { type: acm, arn: arn:aws:acm:eu-central-1:...:certificate/..., warnDays: 30 } # scadenza cert
#   aws: { type: apigateway, apiName: my-api, stage: prod }   # API Gateway (5xx recenti via CloudWatch)
#   aws: { type: sfn, arn: arn:aws:states:...:stateMachine:my-sm } # Step Functions (esecuzioni fallite 24h)
#   aws: { type: eks, cluster: my-cluster }          # EKS (stato cluster + versione)
#   aws: { type: cloudfront, id: E123ABC }           # CloudFront (distribuzione, globale)
#   aws: { type: sns, arn: arn:aws:sns:...:my-topic } # SNS (esiste + sottoscrizioni)
#   aws: { type: s3, bucket: my-bucket }             # S3 (esistenza + esposizione pubblica)
#   aws: { type: kinesis, stream: my-stream }        # Kinesis (stato stream + shard)
#   aws: { type: bedrock, model: anthropic.claude-3-5-sonnet-20241022-v2:0 } # Bedrock: uso/errori/throttle per modello (CloudWatch)
#   aws: { type: sagemaker, endpoint: my-endpoint }  # SageMaker: invocazioni/errori/latenza (CloudWatch)
#   aws: { type: ses }                               # SES: inviate/bounce%/complaint% (account, CloudWatch)
#   aws: { type: opensearch, domain: my-domain, clientId: "111122223333" } # OpenSearch: ClusterStatus + nodi
# Backup RDS: il check "backups" si applica da sé ai servizi type rds (recency ultimo snapshot;
# soglia backupMaxAgeDays, default 2). Allarmi CloudWatch: correlati per dimensione, riga solo se attivi.
# Log recenti (pannello on-demand): automatici per lambda (/aws/lambda/<fn>) ed ecs (dal task def).
# Per altri tipi o un group custom, dichiaralo: aws: { type: ecs, ..., logGroup: /mio/log/group }
# Multi-region: di default la region è quella dell'account; per monitorare una risorsa in
# un'altra region basta l'override per-servizio:
#   aws: { type: lambda, function: my-fn, region: us-east-1 }
# Secret (source, opzionale, richiede CLI Doppler locale):
#   doppler: { project: my-proj, config: stg, compareWith: prd }
# Deep-link rapidi:
#   links: { repo: https://github.com/..., console: https://console.aws.amazon.com/... }
# Dipendenze (vista Topologia): DEDOTTE in automatico da AWS (env Lambda, event source,
# security group) — non serve dichiararle. Puoi comunque aggiungerle/forzarle a mano:
#   dependsOn: [my-db, my-queue]
